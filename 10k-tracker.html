<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10K Training Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #f97316;
      --orange-light: #fed7aa;
      --orange-dark: #c2410c;
      --bg: #fff7ed;
      --card: #ffffff;
      --text: #1c1917;
      --muted: #78716c;
      --green: #16a34a;
      --green-light: #dcfce7;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    header {
      max-width: 480px;
      margin: 0 auto 28px;
      text-align: center;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--orange-dark);
      letter-spacing: -0.5px;
    }

    header p.subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
      max-width: 480px;
      margin: 0 auto 16px;
      padding: 24px;
    }

    .week-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }

    .week-badge {
      background: var(--orange);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .week-badge.rest { background: #a78bfa; }
    .week-badge.taper { background: #06b6d4; }
    .week-badge.race { background: var(--green); }

    .week-title {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .week-dates {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 20px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .progress-track {
      background: #e7e5e4;
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--orange), var(--orange-dark));
      transition: width 0.4s ease;
    }

    .progress-fill.complete {
      background: linear-gradient(90deg, #4ade80, var(--green));
    }

    /* Tasks */
    .tasks { display: flex; flex-direction: column; gap: 10px; }

    .task {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 10px;
      background: #fafaf9;
      border: 1.5px solid #e7e5e4;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .task:hover { border-color: var(--orange-light); background: #fff8f4; }

    .task.checked {
      background: var(--green-light);
      border-color: #86efac;
    }

    .task input[type="checkbox"] { display: none; }

    .checkmark {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid #d4cfc9;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }

    .task.checked .checkmark {
      background: var(--green);
      border-color: var(--green);
    }

    .checkmark svg { display: none; }
    .task.checked .checkmark svg { display: block; }

    .task-text {
      flex: 1;
    }

    .task-label {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .task-detail {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .task.checked .task-label {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    /* Countdown */
    .countdown-card {
      text-align: center;
      padding: 16px 24px;
    }

    .countdown-card .days {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--orange-dark);
      line-height: 1;
    }

    .countdown-card .days-label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Done state */
    .all-done {
      text-align: center;
      padding: 12px 0 4px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--green);
    }

    /* Before/after plan */
    .outside-plan {
      text-align: center;
      padding: 32px 24px;
    }
    .outside-plan .big { font-size: 2rem; margin-bottom: 8px; }
    .outside-plan p { color: var(--muted); font-size: 0.9rem; }

    /* Footer */
    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #c4bfbb;
      margin-top: 24px;
    }
  </style>
</head>
<body>

<header>
  <h1>10K Training Tracker</h1>
  <p class="subtitle">Race Day — July 11, 2026</p>
</header>

<div id="app"></div>

<footer id="footer"></footer>

<script>
  // ── Plan data ──────────────────────────────────────────────────────────────
  const PLAN = [
    { ot: 2, mid: "1.5 mi",  long: "2 mi",       note: null },
    { ot: 2, mid: "2 mi",    long: "2.5 mi",      note: null },
    { ot: 2, mid: "2 mi",    long: "3 mi",        note: null },
    { ot: 1, mid: "1.5 mi",  long: "2.5 mi",      note: "rest week" },
    { ot: 2, mid: "2.5 mi",  long: "3.5 mi",      note: null },
    { ot: 2, mid: "2.5 mi",  long: "4 mi",        note: null },
    { ot: 2, mid: "3 mi",    long: "4.5 mi",      note: null },
    { ot: 1, mid: "2 mi",    long: "3.5 mi",      note: "rest week" },
    { ot: 2, mid: "3 mi",    long: "5 mi",        note: null },
    { ot: 2, mid: "3 mi",    long: "5.5 mi",      note: null },
    { ot: 1, mid: "2 mi",    long: "3 mi",        note: "taper week" },
    { ot: 1, mid: "2 mi easy", long: "Race Day 🎉", note: "race week" },
  ];

  const PLAN_START = new Date(2026, 3, 20); // April 20, 2026 (month is 0-indexed)
  const RACE_DATE  = new Date(2026, 6, 11); // July 11, 2026

  // ── Helpers ────────────────────────────────────────────────────────────────
  function startOfDay(d) {
    return new Date(d.getFullYear(), d.getMonth(), d.getDate());
  }

  function addDays(d, n) {
    const r = new Date(d); r.setDate(r.getDate() + n); return r;
  }

  function formatDate(d) {
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  }

  function currentWeekIndex() {
    const today = startOfDay(new Date());
    const diff = Math.floor((today - PLAN_START) / (1000 * 60 * 60 * 24));
    return Math.floor(diff / 7); // 0-based
  }

  function daysUntilRace() {
    const today = startOfDay(new Date());
    return Math.ceil((RACE_DATE - today) / (1000 * 60 * 60 * 24));
  }

  // ── localStorage (with in-memory fallback) ───────────────────────────────
  const STORAGE_KEY = "10k_tracker_v1";
  let _memStore = null; // fallback when localStorage is unavailable

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return (raw ? JSON.parse(raw) : null) || _memStore || {};
    } catch {
      return _memStore || {};
    }
  }

  function saveState(state) {
    _memStore = state;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
  }

  function getWeekChecks(weekIdx) {
    const state = loadState();
    if (state.weekIdx !== weekIdx) {
      saveState({ weekIdx, checks: {} });
      return {};
    }
    return state.checks || {};
  }

  function setCheck(weekIdx, key, val) {
    const state = loadState();
    if (state.weekIdx !== weekIdx) state.checks = {};
    state.weekIdx = weekIdx;
    state.checks = state.checks || {};
    state.checks[key] = val;
    saveState(state);
  }

  // ── Task builders ─────────────────────────────────────────────────────────
  function buildTasks(week, weekIdx) {
    const tasks = [];
    for (let i = 0; i < week.ot; i++) {
      tasks.push({
        key: `ot_${i}`,
        icon: "🔥",
        label: week.ot > 1 ? `OT Class ${i + 1}` : "OT Class",
        detail: "Orangetheory session",
      });
    }
    tasks.push({
      key: "mid",
      icon: "🏃",
      label: `Mid-week Run`,
      detail: week.mid,
    });
    tasks.push({
      key: weekIdx === 11 ? "race" : "long",
      icon: weekIdx === 11 ? "🏅" : "🛣️",
      label: weekIdx === 11 ? "Race Day!" : "Long Run",
      detail: week.long,
    });
    return tasks;
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    const app = document.getElementById("app");
    const footer = document.getElementById("footer");
    const today = startOfDay(new Date());
    const weekIdx = currentWeekIndex();
    const raceDays = daysUntilRace();

    // Outside training window
    if (weekIdx < 0) {
      app.innerHTML = `
        <div class="card outside-plan">
          <div class="big">⏳</div>
          <p>Training starts <strong>April 21, 2026</strong>. Check back then!</p>
        </div>`;
      footer.textContent = `${Math.abs(weekIdx * 7 + (today - PLAN_START) / (1000*60*60*24)) | 0} days until training begins`;
      return;
    }

    if (weekIdx >= PLAN.length) {
      app.innerHTML = `
        <div class="card outside-plan">
          <div class="big">🏅</div>
          <p>Training complete! Hope the race was amazing.</p>
        </div>`;
      return;
    }

    const week = PLAN[weekIdx];
    const weekNum = weekIdx + 1;
    const weekStart = addDays(PLAN_START, weekIdx * 7);
    const weekEnd   = addDays(weekStart, 6);

    const tasks  = buildTasks(week, weekIdx);
    const checks = getWeekChecks(weekIdx);
    const doneCount = tasks.filter(t => checks[t.key]).length;
    const pct = Math.round((doneCount / tasks.length) * 100);

    const badgeClass = week.note === "rest week" ? "rest"
                     : week.note === "taper week" ? "taper"
                     : week.note === "race week"  ? "race"
                     : "";
    const badgeText  = week.note || `Week ${weekNum} of ${PLAN.length}`;

    const allDone = doneCount === tasks.length;

    const tasksHTML = tasks.map(t => {
      const done = !!checks[t.key];
      return `
        <label class="task${done ? " checked" : ""}" data-key="${t.key}">
          <input type="checkbox" ${done ? "checked" : ""} />
          <span class="checkmark">
            <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
              <path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="task-text">
            <span class="task-label">${t.label}</span>
            <span class="task-detail">${t.detail}</span>
          </span>
          <span class="task-icon">${t.icon}</span>
        </label>`;
    }).join("");

    app.innerHTML = `
      <div class="card">
        <div class="week-header">
          <span class="week-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="week-title">Week ${weekNum} Benchmarks</div>
        <div class="week-dates">${formatDate(weekStart)} – ${formatDate(weekEnd)}</div>

        <div class="progress-wrap">
          <div class="progress-label">
            <span>Progress</span>
            <span>${doneCount} / ${tasks.length} completed</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill${allDone ? " complete" : ""}" style="width:${pct}%"></div>
          </div>
        </div>

        <div class="tasks">${tasksHTML}</div>
        ${allDone ? `<div class="all-done">Week ${weekNum} complete! 🎉</div>` : ""}
      </div>

      <div class="card countdown-card">
        <div class="days">${raceDays}</div>
        <div class="days-label">days until Race Day · July 11, 2026</div>
      </div>`;

    // Attach toggle listeners
    app.querySelectorAll(".task").forEach(el => {
      el.addEventListener("click", () => {
        const key = el.dataset.key;
        const newVal = !checks[key];
        setCheck(weekIdx, key, newVal);
        render();
      });
    });

    footer.textContent = `Resets automatically each new week`;
  }

  render();
</script>
</body>
</html>
